<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Japan Study & JLPT Master Roadmaps (Merged)</title>
<style>
:root{
  --font-sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

  --bg: radial-gradient(1200px 500px at 10% -20%, #e8f0ff 0%, #f7f9fd 45%, #eef3fb 100%);
  --surface-1: #ffffff;
  --surface-2: #f8fafc;
  --surface-soft: #f3f6fc;
  --glass: rgba(255,255,255,.72);

  --text-primary: #0f172a;
  --text-secondary: #475569;
  --text-muted: #64748b;
  --text-accent: #185fa5;
  --text-success: #0f6e56;
  --text-danger: #9b2c2c;
  --text-warning: #854f0b;
  --text-pro: #534ab7;

  --fill-accent: #185fa5;
  --bg-accent: #eaf3ff;
  --bg-success: #ecfdf5;
  --bg-danger: #fef2f2;
  --bg-warning: #fff7ed;
  --bg-pro: #f5f3ff;

  --border: #dbe2ea;
  --border-strong: #cbd5e1;
  --border-accent: #93c5fd;
  --border-success: #86efac;
  --border-danger: #fda4af;
  --border-warning: #fdba74;
  --border-pro: #c4b5fd;

  --radius: 14px;
  --radius-lg: 18px;

  --shadow-xs: 0 1px 3px rgba(15, 23, 42, .06);
  --shadow-sm: 0 4px 12px rgba(15, 23, 42, .06);
  --shadow-md: 0 10px 28px rgba(15, 23, 42, .10);
  --shadow-lg: 0 20px 44px rgba(15, 23, 42, .14);

  --neo-1: #6aa7ff;
  --neo-2: #8b7bff;
  --neo-3: #37d6c4;
}

/* DARK THEME */
[data-theme="dark"]{
  --bg: radial-gradient(1200px 600px at 8% -15%, #0e1b34 0%, #0b1224 42%, #090f1d 100%);
  --surface-1: #0f172a;
  --surface-2: #111c32;
  --surface-soft: #0f1a30;
  --glass: rgba(15, 23, 42, .72);

  --text-primary: #e5edf9;
  --text-secondary: #b8c4d8;
  --text-muted: #8da0bf;
  --text-accent: #7eb5ff;
  --text-success: #48d5a8;
  --text-danger: #ff8f8f;
  --text-warning: #ffc778;
  --text-pro: #b9a7ff;

  --fill-accent: #7eb5ff;
  --bg-accent: rgba(66, 125, 221, .16);
  --bg-success: rgba(30, 166, 112, .17);
  --bg-danger: rgba(205, 74, 74, .15);
  --bg-warning: rgba(205, 139, 42, .16);
  --bg-pro: rgba(124, 95, 244, .16);

  --border: #253452;
  --border-strong: #2f446b;
  --border-accent: #4f8ce6;
  --border-success: #35b788;
  --border-danger: #d97a7a;
  --border-warning: #d89d54;
  --border-pro: #8676ea;

  --shadow-xs: 0 1px 3px rgba(0,0,0,.30);
  --shadow-sm: 0 4px 12px rgba(0,0,0,.30);
  --shadow-md: 0 10px 28px rgba(0,0,0,.36);
  --shadow-lg: 0 20px 44px rgba(0,0,0,.45);

  --neo-1: #6aa7ff;
  --neo-2: #a68cff;
  --neo-3: #3fe0cf;
}

*{box-sizing:border-box}
html,body{height:100%}
html.theme-anim,
html.theme-anim *,
html.theme-anim *::before,
html.theme-anim *::after{
  transition:
    background-color .35s ease,
    color .35s ease,
    border-color .35s ease,
    box-shadow .35s ease,
    fill .35s ease,
    stroke .35s ease !important;
}
body{
  margin:0;
  background:var(--bg);
  color:var(--text-primary);
  font-family:var(--font-sans);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  line-height:1.45;
  position:relative;
  overflow-x:hidden;
}

/* Futuristic animated background layers */
body::before, body::after{
  content:"";
  position:fixed;
  inset:-10% -10%;
  z-index:-3;
  pointer-events:none;
}
body::before{
  background:
    radial-gradient(300px 220px at 15% 20%, color-mix(in srgb, var(--neo-1) 26%, transparent), transparent 70%),
    radial-gradient(280px 220px at 80% 15%, color-mix(in srgb, var(--neo-2) 24%, transparent), transparent 72%),
    radial-gradient(320px 250px at 75% 80%, color-mix(in srgb, var(--neo-3) 20%, transparent), transparent 72%);
  filter:blur(16px);
  animation:auraShift 14s ease-in-out infinite alternate;
}
body::after{
  z-index:-2;
  opacity:.18;
  background-image:
    linear-gradient(to right, color-mix(in srgb, var(--text-accent) 20%, transparent) 1px, transparent 1px),
    linear-gradient(to bottom, color-mix(in srgb, var(--text-accent) 16%, transparent) 1px, transparent 1px);
  background-size: 34px 34px;
  mask-image: radial-gradient(circle at 50% 35%, #000 28%, transparent 72%);
}
@keyframes auraShift{
  0%{transform:translate3d(0,0,0) scale(1)}
  100%{transform:translate3d(1.5%, -1%, 0) scale(1.04)}
}

/* click ripple */
.click-anim{
  position:relative;
  overflow:hidden;
}
.click-anim::after{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  width:8px;height:8px;
  border-radius:999px;
  background:color-mix(in srgb, var(--text-accent) 35%, transparent);
  transform:translate(-50%,-50%) scale(1);
  opacity:0;
  pointer-events:none;
}
.click-anim:active::after{
  animation:ripple .45s ease-out;
}
@keyframes ripple{
  0%{opacity:.55; transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0; transform:translate(-50%,-50%) scale(20)}
}

#app{
  width:min(1500px, calc(100% - 2rem));
  margin:clamp(8px, 1.6vw, 24px) auto;
  min-height:calc(100vh - 1.25rem);
  background:var(--glass);
  border:1px solid color-mix(in srgb, var(--border) 80%, transparent);
  border-radius:clamp(12px, 1.8vw, 22px);
  overflow:hidden;
  box-shadow:var(--shadow-lg);
  backdrop-filter: blur(10px);
}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}

.theme-toggle{
  margin-left:auto;
  border:1px solid var(--border-strong);
  background:linear-gradient(180deg, var(--surface-1), var(--surface-2));
  color:var(--text-primary);
  padding:8px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
  box-shadow:var(--shadow-xs);
  transition:.2s ease;
}
.theme-toggle:hover{transform:translateY(-1px); box-shadow:var(--shadow-sm)}
.theme-toggle:active{transform:translateY(0)}

/* Header + top nav */
.top-wrap{
  position:sticky;
  top:0;
  z-index:100;
  border-bottom:0.5px solid var(--border);
  background:linear-gradient(180deg, color-mix(in srgb, var(--surface-2) 92%, transparent), color-mix(in srgb, var(--surface-2) 82%, transparent));
  backdrop-filter:blur(12px);
}
.top-head{
  padding:clamp(0.9rem, 1.8vw, 1.4rem) clamp(0.95rem, 2vw, 1.5rem) .9rem;
  display:flex;align-items:center;gap:10px;
}
.top-title{margin:0;font-size:clamp(1.02rem, .95rem + .7vw, 1.45rem);font-weight:700;letter-spacing:.01em}
.top-sub{margin:6px 0 0;font-size:clamp(.76rem, .7rem + .24vw, .95rem);color:var(--text-muted)}

.main-tabs,.sub-tabs{
  display:flex;overflow-x:auto;border-top:0.5px solid var(--border);scrollbar-width:thin;
  background:color-mix(in srgb, var(--surface-2) 86%, transparent);
}
.main-tabs::-webkit-scrollbar,.sub-tabs::-webkit-scrollbar{height:8px}
.main-tabs::-webkit-scrollbar-thumb,.sub-tabs::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:999px}

.main-tab,.sub-tab{
  padding:11px 14px;border:none;background:none;cursor:pointer;display:flex;align-items:center;gap:6px;
  font-size:13px;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;transition:all .18s ease;
  position:relative;overflow:hidden;
}
.main-tab::after,.sub-tab::after{
  content:"";position:absolute;inset:0;transform:translateX(-120%);
  background:linear-gradient(120deg, transparent 35%, color-mix(in srgb, var(--text-accent) 16%, transparent) 50%, transparent 65%);
  transition:transform .55s ease;
}
.main-tab:hover::after,.sub-tab:hover::after{transform:translateX(120%)}
.main-tab.on,.sub-tab.on{
  color:var(--text-accent);border-bottom-color:var(--fill-accent);font-weight:700;
  background:linear-gradient(180deg, color-mix(in srgb, var(--text-accent) 10%, transparent), transparent);
}
.main-tab:not(.on),.sub-tab:not(.on){color:var(--text-secondary)}

.page{padding:0}
.hidden{display:none}

/* page switch animation */
.page-enter{
  animation:pageIn .28s ease;
}
@keyframes pageIn{
  from{opacity:0; transform:translateY(8px) scale(.995)}
  to{opacity:1; transform:translateY(0) scale(1)}
}

/* Shared styles from source files */
.tb,.tab-btn,.tabbtn{
  padding:10px 14px;border:none;background:none;cursor:pointer;display:flex;align-items:center;gap:6px;
  font-size:13px;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;transition:all .16s ease;
  position:relative;overflow:hidden;
}
.tb.on,.tab-btn.active,.tabbtn.on{color:var(--text-accent);border-bottom-color:var(--fill-accent);font-weight:700}
.tb:not(.on),.tab-btn:not(.active),.tabbtn:not(.on){color:var(--text-secondary)}
.tb:hover,.tab-btn:hover,.tabbtn:hover{background:color-mix(in srgb, var(--border-strong) 35%, transparent)}

.cd,.card,.card2{
  background:linear-gradient(180deg, color-mix(in srgb, var(--surface-1) 96%, transparent), color-mix(in srgb, var(--surface-2) 96%, transparent));
  border:1px solid color-mix(in srgb, var(--border) 82%, transparent);
  border-radius:var(--radius);
  box-shadow:var(--shadow-sm);
  transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease;
}
.cd:hover,.card:hover,.card2:hover{
  transform:translateY(-2px);
  box-shadow:var(--shadow-md);
  border-color:color-mix(in srgb, var(--text-accent) 32%, var(--border));
}
.cd{padding:1rem 1.25rem;margin-bottom:10px}
.card{border-radius:var(--radius)}
.card2{padding:1rem 1.25rem;margin-bottom:10px}

.lb,.section-label,.lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin:0 0 10px}
.tg,.tag,.badge{font-size:10px;padding:2px 8px;border-radius:999px;border:0.5px solid;white-space:nowrap}
.badge{margin-left:8px}
.kv{display:flex;gap:1rem;padding:7px 0;border-bottom:0.5px solid var(--border)}
.kv:last-child{border-bottom:none}
.kvl{min-width:116px;font-size:12px;font-weight:600;color:var(--text-muted)}
.kvv{font-size:13px;color:var(--text-primary);line-height:1.55}
.qa{padding:10px 0;border-bottom:0.5px solid var(--border)}
.qa:last-child{border-bottom:none;padding-bottom:0}

.pill-btn,.lvlpill{
  padding:6px 14px;border-radius:999px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;
  transition:all .18s ease;border:0.5px solid var(--border-strong);background:var(--surface-2);color:var(--text-secondary);
}
.pill-btn:hover,.lvlpill:hover{transform:translateY(-1px);box-shadow:var(--shadow-xs)}
.pill-btn:active,.lvlpill:active{transform:translateY(0)}

.row-item{display:flex;gap:12px;align-items:flex-start}
.stat{
  flex:1;text-align:center;padding:10px 4px;border-radius:10px;background:var(--surface-1);
  border:0.5px solid var(--border);box-shadow:inset 0 0 0 1px color-mix(in srgb, #fff 24%, transparent);
}
.statn{font-size:18px;font-weight:700;margin:0}
.statl{font-size:10px;color:var(--text-muted);margin:2px 0 0;text-transform:uppercase;letter-spacing:.05em}
.bk,.yt,.tip{padding:10px 0;border-bottom:0.5px solid var(--border)}
.bk:last-child,.yt:last-child,.tip:last-child{border-bottom:none;padding-bottom:0}
.yt,.tip{display:flex;gap:10px;align-items:flex-start}

/* Big screens (PC/TV) */
@media (min-width: 1280px){
  body{font-size:16px}
  .top-title{font-size:1.55rem}
  .top-sub{font-size:.96rem}
  .main-tab,.sub-tab,.tb,.tab-btn,.tabbtn{font-size:14px}
  .kvl,.kvv{font-size:14px}
  .card,.cd,.card2{box-shadow:var(--shadow-md)}
  #app{width:min(1750px, calc(100% - 3rem))}
}

/* Laptop/tablet */
@media (max-width: 1024px){
  #app{width:min(1200px, calc(100% - 1rem)); margin:8px auto}
}

/* Mobile */
@media (max-width: 860px){
  #app{width:100%;margin:0;min-height:100vh;border:none;border-radius:0}
  .top-wrap{top:0}
  .top-head{padding:.92rem .95rem .74rem}
  .main-tab,.sub-tab,.tb,.tab-btn,.tabbtn{padding:10px 12px;font-size:12.5px}
  .kv{flex-direction:column;gap:3px}
  .kvl{min-width:unset}
  .cd,.card2{padding:.92rem 1rem}

  [style*="grid-template-columns:minmax(0,1fr) minmax(0,1fr)"]{display:block !important}
  [style*="grid-template-columns:minmax(0,1fr) minmax(0,1fr)"] > div{
    border-right:none !important;
    border-bottom:0.5px solid var(--border)
  }
  [style*="grid-template-columns:minmax(0,1fr) minmax(0,1fr)"] > div:last-child{border-bottom:none}
}

/* Tiny mobile */
@media (max-width: 480px){
  .top-title{font-size:1rem}
  .top-sub{font-size:.77rem}
  .badge,.tg,.tag{font-size:9px;padding:2px 7px}
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce){
  *{transition:none !important; animation:none !important}
  body::before{animation:none}
}
</style>
</head>

  <div>
    <h1 class="top-title">Japan Roadmaps — Unified Master Page</h1>
    <p class="top-sub">All original files merged with same details, same context, same visual style.</p>
  </div>
  <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">🌙 Dark</button>
</div>
    <div class="main-tabs" id="mainTabs"></div>
    <div class="sub-tabs" id="subTabs"></div>
  </div>

  <div class="page" id="page-mext"></div>
  <div class="page hidden" id="page-map"></div>
  <div class="page hidden" id="page-jlpt"></div>
</div>

<script>
/* =========================
   GLOBAL TOP-LEVEL NAV
========================= */
const MAIN = [
  {id:"study", label:"Study & Scholarship"},
  {id:"language", label:"JLPT Master Plan"}
];
const SUB = {
  study: [
    {id:"mext", label:"MEXT Scholarship Roadmap"},
    {id:"map", label:"Scholarships & Internships Map"}
  ],
  language: [
    {id:"jlpt", label:"JLPT N5 → N1 Roadmap"}
  ]
};
let topState = { main:"study", sub:"mext" };

function renderTopNav(){
  const mainTabs = document.getElementById("mainTabs");
  const subTabs = document.getElementById("subTabs");

  mainTabs.innerHTML = MAIN.map(m => `
    <button class="main-tab click-anim ${topState.main===m.id?"on":""}" onclick="setMain('${m.id}')">${m.label}</button>
  `).join("");

  subTabs.innerHTML = SUB[topState.main].map(s => `
    <button class="sub-tab click-anim ${topState.sub===s.id?"on":""}" onclick="setSub('${s.id}')">${s.label}</button>
  `).join("");

  const pages = ["page-mext","page-map","page-jlpt"];
  pages.forEach(id => document.getElementById(id).classList.remove("page-enter"));

  document.getElementById("page-mext").classList.toggle("hidden", topState.sub!=="mext");
  document.getElementById("page-map").classList.toggle("hidden", topState.sub!=="map");
  document.getElementById("page-jlpt").classList.toggle("hidden", topState.sub!=="jlpt");

  const activePageId = topState.sub === "mext" ? "page-mext" : topState.sub === "map" ? "page-map" : "page-jlpt";
  const activePage = document.getElementById(activePageId);
  requestAnimationFrame(() => activePage.classList.add("page-enter"));
}
function setMain(m){
  topState.main = m;
  topState.sub = SUB[m][0].id;
  renderTopNav();
}
function setSub(s){
  topState.sub = s;
  renderTopNav();
}

(function initJlptMaster(){

{id:1,tag:"N4",name:"JLPT N4",col:"blue",vocab:"~1,500",kanji:"~300",grammar:"~200",hours:"575–1000",desc:"Elementary level — understanding of basic Japanese used in everyday situations, including the ability to read passages on familiar daily topics.",syllabus:["て-form extensions: ている, てある, てしまう, てもいい, てはいけない","Potential, passive, and causative-adjacent basic forms","Conditional forms: たら, ば, と","Plain form vs ます-form, casual speech patterns","Comparisons, giving/receiving verbs (あげる/もらう/くれる)","Volitional form, intention expressions (つもり, よてい)","Reading: simple narratives and everyday written communications","Listening: natural-paced conversations on familiar topics"],books:[{t:"Genki II — Textbook + Workbook (3rd ed.)",tag:"Core",notes:"Chapters 13–23. Direct continuation of Genki I. Introduces all the grammar forms above with the same structured method."},{t:"So-Matome N4 (Grammar, Vocabulary, Kanji, Reading-Listening)",tag:"Exam prep",notes:"Use after completing Genki II — 6-week structured format ideal for confirming exam-readiness in the final stretch."},{t:"Try! N4",tag:"Optional",notes:"Extra practice questions in JLPT format if you want more drilling beyond So-Matome."}]},

/* =========================
   THEME TOGGLE + ANIMATED SWITCH
========================= */
(function initTheme(){
  const root = document.documentElement;
  const btn = document.getElementById("themeToggle");
  const saved = localStorage.getItem("jr_theme");
  const systemDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  const startDark = saved ? saved === "dark" : systemDark;

  if(startDark) root.setAttribute("data-theme","dark");
  updateButton();

  btn?.addEventListener("click", () => {
    root.classList.add("theme-anim");
    const isDark = root.getAttribute("data-theme") === "dark";
    if(isDark){
      root.removeAttribute("data-theme");
      localStorage.setItem("jr_theme","light");
    }else{
      root.setAttribute("data-theme","dark");
      localStorage.setItem("jr_theme","dark");
    }
    updateButton();
    setTimeout(()=>root.classList.remove("theme-anim"), 420);
  });

  function updateButton(){
    const dark = root.getAttribute("data-theme") === "dark";
    if(btn) btn.textContent = dark ? "☀️ Light" : "🌙 Dark";
  }
})();

renderTopNav();
</script>
